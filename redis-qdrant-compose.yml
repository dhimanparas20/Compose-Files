volumes:
  redis-data:
    driver: local
  qdrant-data:
    driver: local

services:
  redis:
    image: redis/redis-stack:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --loadmodule /opt/redis-stack/lib/redisearch.so
      --loadmodule /opt/redis-stack/lib/rejson.so
      --requirepass testpass
      --maxmemory 1024mb
      --maxmemory-policy noeviction
      --save 900 1
      --save 300 10
      --save 60 1
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --stop-writes-on-bgsave-error yes
      --rdbcompression yes
      --rdbchecksum yes
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M # Gives a 512MB buffer over maxmemory for background saves
        reservations:
          cpus: '0.5'
          memory: 1024M
    healthcheck:
      # Updated to authenticate with your password and use the standard ping
      test: [ "CMD", "redis-cli", "-a", "testpass", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: "testpass"
      QDRANT__SERVICE__MAX_REQUEST_SIZE_MB: "32"
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: "1"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1800M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1
      interval: 2m
      timeout: 5s
      retries: 3
      start_period: 5s
