# Connection String will be : mongodb://admin_root:your_super_strong_production_password_here@localhost:27017/?authSource=admin

services:
  mongodb:
    # FIXED: Swapped from '7.0-noble' to the correct official '7.0-jammy' tag
    image: mongo:7.0-jammy 
    container_name: mongodb
    restart: always
    ports:
      # Keeps the port bound strictly to localhost for security
      - "127.0.0.1:27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin_root
      - MONGO_INITDB_ROOT_PASSWORD=your_super_strong_production_password_here
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    command: >
      mongod 
      --auth 
      --wiredTigerCacheSizeGB 1.0
    deploy:
      resources:
        limits:
          memory: 2.5G
        reservations:
          memory: 1G

volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local
